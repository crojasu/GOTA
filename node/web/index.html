<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GOTA</title>
  <meta name="description" content="Search and share files across decentralized networks">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💧</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0a;
      --surface: #161616;
      --surface-2: #1c1c1c;
      --surface-hover: #222;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --text-muted: #888;
      --text-dim: #555;
      --accent: #4fc3f7;
      --accent-dim: rgba(79,195,247,0.1);
      --green: #66bb6a;
      --green-dim: rgba(102,187,106,0.1);
      --orange: #ffa726;
      --orange-dim: rgba(255,167,38,0.1);
      --purple: #ab47bc;
      --purple-dim: rgba(171,71,188,0.1);
      --red: #ef5350;
      --radius: 24px;
      --radius-sm: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Landing (centered, Google-style) ── */

    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem 1.5rem;
      transition: all 0.3s ease;
    }

    .landing.has-results {
      min-height: auto;
      justify-content: flex-start;
      padding-top: 2rem;
    }

    .landing.has-results .logo { margin-bottom: 1.5rem; }
    .landing.has-results .logo h1 { font-size: 1.8rem; }
    .landing.has-results .tagline { display: none; }
    .landing.has-results .categories { margin-bottom: 1.5rem; }

    /* ── Logo ──────────────────────────────── */

    .logo {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .logo h1 {
      font-size: 4rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--accent), #81d4fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      color: var(--text-muted);
      font-size: 1.05rem;
      margin-top: 0.5rem;
      font-weight: 300;
    }

    /* ── Search bar ────────────────────────── */

    .search-wrap {
      width: 100%;
      max-width: 620px;
      margin-bottom: 1.25rem;
    }

    .search-bar {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 0 0.5rem 0 1.25rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      height: 52px;
    }

    .search-bar:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .search-icon {
      color: var(--text-muted);
      flex-shrink: 0;
      width: 20px;
      height: 20px;
    }

    .search-bar input {
      flex: 1;
      background: none;
      border: none;
      color: var(--text);
      padding: 0 0.75rem;
      font-size: 1rem;
      outline: none;
      height: 100%;
    }

    .search-bar input::placeholder { color: var(--text-dim); }

    .search-bar .upload-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      transition: all 0.15s;
      display: flex;
      align-items: center;
    }

    .search-bar .upload-btn:hover {
      background: var(--surface-hover);
      color: var(--accent);
    }

    .search-bar .search-btn {
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: 20px;
      padding: 0 1.25rem;
      height: 36px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      margin-left: 0.25rem;
      transition: opacity 0.15s;
    }

    .search-bar .search-btn:hover { opacity: 0.85; }

    /* ── Categories ────────────────────────── */

    .categories {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .cat-btn {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      padding: 0.5rem 1.1rem;
      font-size: 0.82rem;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .cat-btn:hover { border-color: var(--text-muted); color: var(--text); }
    .cat-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

    .cat-icon { font-size: 1rem; }

    /* ── Status (subtle, top-right) ────────── */

    .status-bar {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
      z-index: 50;
    }

    .status-pill {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.25rem 0.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.7rem;
      color: var(--text-dim);
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
    }

    .status-dot.ok { background: var(--green); }
    .status-dot.degraded { background: var(--orange); }

    /* ── Results area ──────────────────────── */

    .results-wrap {
      width: 100%;
      max-width: 620px;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      animation: fadeIn 0.2s ease;
      transition: border-color 0.15s;
    }

    .result-card:hover { border-color: #333; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
    }

    .result-filename {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--accent);
      cursor: pointer;
    }

    .result-filename:hover { text-decoration: underline; }

    .badge-row { display: flex; gap: 0.3rem; flex-shrink: 0; }

    .protocol-badge {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      letter-spacing: 0.03em;
    }

    .protocol-badge.ipfs { background: var(--accent-dim); color: var(--accent); }
    .protocol-badge.bittorrent { background: var(--green-dim); color: var(--green); }
    .protocol-badge.hypercore { background: var(--orange-dim); color: var(--orange); }

    .result-meta {
      display: flex;
      gap: 0.75rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 0.3rem;
    }

    .result-ids {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      word-break: break-all;
      margin-top: 0.4rem;
      line-height: 1.5;
    }

    .result-actions {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.6rem;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.35rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      background: var(--surface-2);
      color: var(--text-muted);
    }

    .btn:hover { border-color: var(--text-dim); color: var(--text); }

    .btn-dl {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: transparent;
    }

    .btn-dl:hover { background: rgba(79,195,247,0.2); }

    /* ── Section divider ───────────────────── */

    .section-title {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 1.5rem 0 0.75rem;
    }

    /* ── Upload modal ──────────────────────── */

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 200;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 2rem;
      width: 90%;
      max-width: 480px;
      animation: fadeIn 0.2s ease;
    }

    .modal h3 {
      font-size: 1.1rem;
      margin-bottom: 1.25rem;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-sm);
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .drop-zone-text { color: var(--text-muted); font-size: 0.9rem; }
    .drop-zone-text strong { color: var(--accent); }

    .modal-options {
      display: flex;
      gap: 0.5rem;
      margin-top: 1rem;
      flex-wrap: wrap;
    }

    .modal-options .cat-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--text-dim);
      position: absolute;
      top: 1rem;
      right: 1rem;
      font-size: 1.5rem;
      cursor: pointer;
    }

    /* ── Toast ─────────────────────────────── */

    .toast-container {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 300;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
    }

    .toast {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.6rem 1.2rem;
      font-size: 0.82rem;
      color: var(--text);
      animation: toastIn 0.25s ease;
    }

    .toast.error { border-color: var(--red); }
    .toast.success { border-color: var(--green); }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Loading ───────────────────────────── */

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      color: var(--text-muted);
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      justify-content: center;
      padding: 1rem 0;
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    #file-input { display: none; }

    /* ── Responsive ────────────────────────── */

    @media (max-width: 480px) {
      .logo h1 { font-size: 2.8rem; }
      .tagline { font-size: 0.9rem; }
      .status-bar { position: static; justify-content: center; margin-bottom: 1rem; }
      .landing { padding: 1.5rem 1rem; }
      .result-meta { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <!-- Status (top-right) -->
  <div class="status-bar" id="status-bar"></div>

  <div class="landing" id="landing">
    <!-- Logo -->
    <div class="logo">
      <h1>GOTA</h1>
      <p class="tagline">Search across decentralized networks</p>
    </div>

    <!-- Search bar -->
    <div class="search-wrap">
      <div class="search-bar">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search files, paste a CID, infohash, or magnet link..." autocomplete="off" spellcheck="false">
        <button class="upload-btn" id="upload-trigger" title="Upload file">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </button>
        <button class="search-btn" id="search-btn">Search</button>
      </div>
    </div>

    <!-- Categories -->
    <div class="categories" id="categories">
      <button class="cat-btn active" data-cat="all">
        <span class="cat-icon">&#9776;</span> All
      </button>
      <button class="cat-btn" data-cat="documents">
        <span class="cat-icon">&#128196;</span> Documents
      </button>
      <button class="cat-btn" data-cat="images">
        <span class="cat-icon">&#128247;</span> Images
      </button>
      <button class="cat-btn" data-cat="video">
        <span class="cat-icon">&#127909;</span> Video
      </button>
      <button class="cat-btn" data-cat="audio">
        <span class="cat-icon">&#127925;</span> Audio
      </button>
      <button class="cat-btn" data-cat="code">
        <span class="cat-icon">&#128187;</span> Code
      </button>
      <button class="cat-btn" data-cat="archives">
        <span class="cat-icon">&#128230;</span> Archives
      </button>
    </div>

    <!-- Results -->
    <div class="results-wrap">
      <div id="results"></div>
      <div id="recent-section">
        <div class="section-title" id="recent-label"></div>
        <div id="recent-files"></div>
      </div>
    </div>
  </div>

  <!-- Upload modal -->
  <div class="modal-overlay" id="upload-modal">
    <div class="modal">
      <h3>Upload to the network</h3>
      <div class="drop-zone" id="drop-zone">
        <div class="drop-zone-text">
          <strong>Drop a file here</strong> or click to browse
        </div>
      </div>
      <input type="file" id="file-input">
      <div class="modal-options">
        <button class="cat-btn active" data-proto="all">All networks</button>
        <button class="cat-btn" data-proto="ipfs">IPFS</button>
        <button class="cat-btn" data-proto="bittorrent">BitTorrent</button>
        <button class="cat-btn" data-proto="hypercore">Hypercore</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toasts"></div>

  <script>
    const API = '';
    let activeCategory = 'all';
    let activeProto = 'all';

    // ── Category extensions mapping ────────

    const catExtensions = {
      documents: ['.pdf','.doc','.docx','.txt','.rtf','.odt','.xls','.xlsx','.csv','.ppt','.pptx','.md'],
      images: ['.jpg','.jpeg','.png','.gif','.svg','.webp','.bmp','.ico','.tiff'],
      video: ['.mp4','.mkv','.avi','.mov','.webm','.flv','.wmv','.m4v'],
      audio: ['.mp3','.wav','.flac','.aac','.ogg','.wma','.m4a'],
      code: ['.js','.ts','.py','.go','.rs','.java','.c','.cpp','.h','.html','.css','.json','.xml','.yaml','.yml','.sh','.sql','.rb','.php','.swift','.kt'],
      archives: ['.zip','.tar','.gz','.rar','.7z','.bz2','.xz','.tar.gz','.tgz'],
    };

    function matchesCategory(filename, cat) {
      if (cat === 'all') return true;
      const exts = catExtensions[cat] || [];
      const lower = filename.toLowerCase();
      return exts.some(ext => lower.endsWith(ext));
    }

    // ── Status ────────────────────────────

    async function updateStatus() {
      try {
        const res = await fetch(`${API}/protocols`);
        const data = await res.json();
        document.getElementById('status-bar').innerHTML = data.available.map(a => `
          <div class="status-pill">
            <div class="status-dot ${a.status}"></div>
            ${a.name} &middot; ${a.peers}
          </div>
        `).join('');
      } catch {
        document.getElementById('status-bar').innerHTML =
          '<div class="status-pill"><div class="status-dot"></div>offline</div>';
      }
    }
    updateStatus();
    setInterval(updateStatus, 5000);

    // ── Categories ────────────────────────

    document.getElementById('categories').addEventListener('click', e => {
      const btn = e.target.closest('.cat-btn');
      if (!btn) return;
      document.querySelectorAll('#categories .cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.cat;
      // Re-filter current results or reload
      const q = searchInput.value.trim();
      if (q && !isContentId(q)) doSearch();
      else loadRecentFiles();
    });

    // ── Search ────────────────────────────

    const searchInput = document.getElementById('search-input');
    const searchBtn = document.getElementById('search-btn');

    searchBtn.addEventListener('click', () => doSearch());
    searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

    let searchTimer;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      const q = searchInput.value.trim();
      if (q.length >= 2 && !isContentId(q)) {
        searchTimer = setTimeout(() => doSearch(), 300);
      } else if (q.length === 0) {
        clearResults();
        document.getElementById('landing').classList.remove('has-results');
        loadRecentFiles();
      }
    });

    function isContentId(str) {
      if (str.startsWith('bafkrei') || str.startsWith('bafy')) return true;
      if (/^[a-f0-9]{40}$/i.test(str)) return true;
      if (/^[a-f0-9]{64}$/i.test(str)) return true;
      if (str.startsWith('magnet:')) return true;
      return false;
    }

    async function doSearch() {
      const q = searchInput.value.trim();
      if (!q) return;

      if (isContentId(q)) return doDownload(q);

      document.getElementById('landing').classList.add('has-results');
      document.getElementById('recent-section').style.display = 'none';

      try {
        const res = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        clearResults();

        let filtered = data.results;
        if (activeCategory !== 'all') {
          filtered = filtered.filter(f => matchesCategory(f.filename, activeCategory));
        }

        if (filtered.length === 0) {
          document.getElementById('results').innerHTML =
            `<div class="empty-state">No ${activeCategory === 'all' ? '' : activeCategory + ' '}files found for "${escapeHtml(q)}"</div>`;
          return;
        }

        filtered.forEach(f => showFileCard(f, 'results'));
      } catch {
        toast('Search failed', 'error');
      }
    }

    async function doDownload(rawId, filename) {
      let contentId = rawId || searchInput.value.trim();
      if (!contentId) return;

      const magnetMatch = contentId.match(/btih:([a-f0-9]{40})/i);
      if (magnetMatch) contentId = magnetMatch[1];

      document.getElementById('landing').classList.add('has-results');
      showLoading('Fetching from network...');

      try {
        const res = await fetch(`${API}/download/${encodeURIComponent(contentId)}`);
        if (!res.ok) throw new Error((await res.json()).error || 'Download failed');
        const data = await res.json();

        const dlName = filename || data.filename || `gota-${contentId.slice(0, 12)}`;
        const bytes = base64ToBytes(data.content);
        const blob = new Blob([bytes]);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = dlName;
        a.click();
        URL.revokeObjectURL(url);

        clearResults();
        showSingleResult({
          filename: dlName, id: contentId, protocol: data.protocol,
          sizeBytes: data.sizeBytes, latencyMs: data.dhtLatencyMs
        });
        toast(`Downloaded ${dlName}`, 'success');
      } catch (err) {
        clearResults();
        toast(err.message, 'error');
      }
    }

    // ── Upload ────────────────────────────

    const modal = document.getElementById('upload-modal');
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');

    document.getElementById('upload-trigger').addEventListener('click', () => {
      modal.classList.add('show');
    });

    modal.addEventListener('click', e => {
      if (e.target === modal) modal.classList.remove('show');
    });

    // Protocol toggle in modal
    document.querySelector('.modal-options').addEventListener('click', e => {
      const btn = e.target.closest('.cat-btn');
      if (!btn) return;
      document.querySelectorAll('.modal-options .cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeProto = btn.dataset.proto;
    });

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) uploadFile(fileInput.files[0]);
      fileInput.value = '';
    });

    async function uploadFile(file) {
      modal.classList.remove('show');
      document.getElementById('landing').classList.add('has-results');
      document.getElementById('recent-section').style.display = 'none';
      showLoading(`Uploading ${file.name}...`);

      try {
        const content = await fileToBase64(file);
        const endpoint = activeProto === 'all' ? '/upload/all' : '/upload';
        const body = { filename: file.name, content };
        if (activeProto !== 'all') body.protocol = activeProto;

        const res = await fetch(`${API}${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });

        if (!res.ok) throw new Error((await res.json()).error || 'Upload failed');
        const data = await res.json();
        clearResults();

        if (activeProto === 'all') {
          data.ids.forEach(item => {
            showSingleResult({ filename: file.name, id: item.id, protocol: item.protocol, sizeBytes: data.sizeBytes });
          });
          toast(`Uploaded to ${data.protocols.length} networks`, 'success');
        } else {
          showSingleResult({ filename: file.name, id: data.cid, protocol: data.protocol, sizeBytes: data.sizeBytes });
          toast(`Uploaded to ${data.protocol}`, 'success');
        }

        loadRecentFiles();
      } catch (err) {
        clearResults();
        toast(err.message, 'error');
      }
    }

    // ── Recent files ──────────────────────

    async function loadRecentFiles() {
      try {
        const res = await fetch(`${API}/files?limit=30`);
        const data = await res.json();
        const container = document.getElementById('recent-files');
        const label = document.getElementById('recent-label');
        const section = document.getElementById('recent-section');
        section.style.display = '';

        let files = data.files;
        if (activeCategory !== 'all') {
          files = files.filter(f => matchesCategory(f.filename, activeCategory));
        }

        if (files.length === 0) {
          label.textContent = '';
          container.innerHTML = files.length === 0 && data.total === 0
            ? '<div class="empty-state">No files yet. Upload something to get started.</div>'
            : `<div class="empty-state">No ${activeCategory} files yet.</div>`;
          return;
        }

        label.textContent = `Recent files`;
        container.innerHTML = '';
        files.forEach(file => showFileCard(file, 'recent-files'));
      } catch {}
    }
    loadRecentFiles();

    // ── UI builders ───────────────────────

    function showFileCard(file, containerId) {
      const container = document.getElementById(containerId);
      const card = document.createElement('div');
      card.className = 'result-card';

      const badges = file.ids.map(i =>
        `<span class="protocol-badge ${i.protocol}">${i.protocol}</span>`
      ).join('');

      const ids = file.ids.map(i => escapeHtml(i.id)).join('\n');

      const actions = file.ids.map(i =>
        `<button class="btn btn-dl" onclick="doDownload('${escapeHtml(i.id)}','${escapeHtml(file.filename)}')">&#8595; ${i.protocol}</button>
         <button class="btn" onclick="copyToClipboard('${escapeHtml(i.id)}')">Copy</button>`
      ).join(' ');

      card.innerHTML = `
        <div class="result-header">
          <span class="result-filename" onclick="doDownload('${escapeHtml(file.ids[0].id)}','${escapeHtml(file.filename)}')">${escapeHtml(file.filename)}</span>
          <div class="badge-row">${badges}</div>
        </div>
        <div class="result-meta">
          <span>${formatBytes(file.sizeBytes)}</span>
          <span>${timeAgo(file.uploadedAt)}</span>
          ${file.circleId ? '<span>&#128274; encrypted</span>' : ''}
        </div>
        <div class="result-ids">${ids}</div>
        <div class="result-actions">${actions}</div>
      `;
      container.appendChild(card);
    }

    function showSingleResult({ filename, id, protocol, sizeBytes, latencyMs }) {
      const results = document.getElementById('results');
      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `
        <div class="result-header">
          <span class="result-filename">${escapeHtml(filename)}</span>
          <div class="badge-row"><span class="protocol-badge ${protocol}">${protocol}</span></div>
        </div>
        <div class="result-meta">
          <span>${formatBytes(sizeBytes)}</span>
          ${latencyMs != null ? `<span>${latencyMs}ms</span>` : ''}
        </div>
        <div class="result-ids">${escapeHtml(id)}</div>
        <div class="result-actions">
          <button class="btn" onclick="copyToClipboard('${escapeHtml(id)}')">Copy ID</button>
        </div>
      `;
      results.prepend(card);
    }

    function showLoading(text) {
      clearResults();
      document.getElementById('results').innerHTML =
        `<div class="loading-text"><span class="spinner"></span> ${text}</div>`;
    }

    function clearResults() { document.getElementById('results').innerHTML = ''; }

    function toast(message, type = '') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = message;
      document.getElementById('toasts').appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => toast('Copied', 'success'));
    }

    // ── Utilities ─────────────────────────

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function base64ToBytes(b64) {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    function formatBytes(b) {
      if (!b) return '0 B';
      const s = ['B','KB','MB','GB'];
      const i = Math.floor(Math.log(b) / Math.log(1024));
      return `${(b / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0)} ${s[i]}`;
    }

    function timeAgo(ts) {
      const d = Date.now() - ts;
      if (d < 60000) return 'just now';
      if (d < 3600000) return `${Math.floor(d/60000)}m ago`;
      if (d < 86400000) return `${Math.floor(d/3600000)}h ago`;
      return `${Math.floor(d/86400000)}d ago`;
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ── Service Worker ────────────────────

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
